name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    name: Unit and performance tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm test
      - run: npm run benchmark

  vscode:
    name: VS Code integration test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y xvfb
      - run: xvfb-run -a npm run test:integration
      - run: xvfb-run -a npm run test:multi

  package:
    name: Package and audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run package
      - run: npx --no-install vsce ls
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: searchx-vsix-${{ github.sha }}
          path: searchx-*.vsix
          if-no-files-found: error
          retention-days: 30
